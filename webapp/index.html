<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>qbit swap — atomic BTC ⇄ QBT</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231ab453'/%3E%3Ccircle cx='14' cy='15' r='6.2' fill='%2307110b'/%3E%3Ccircle cx='23' cy='23' r='3.1' fill='%2307110b'/%3E%3C/svg%3E" />
<style>
  :root {
    /* dark-first: a focused, non-custodial financial tool reads best on a calm dark surface */
    /* Qbit brand palette (from qbit.org) — green accent on a green-tinted dark base */
    --bg:#07110b; --surface:#0e1712; --surface-2:#14211b; --raised:#1a2c22;
    --line:#1e3327; --line-2:#294435;
    --ink:#e9f2ec; --ink-2:#c0d0c6; --mut:#7f948a;
    --accent:#1ab453; --accent-ink:#03130a; --accent-soft:rgba(26,180,83,.15); --accent-line:rgba(26,180,83,.42); --accent-bright:#20c760;
    --good:#20c760; --good-soft:rgba(32,199,96,.15);
    --warn:#e7b45a; --warn-soft:rgba(231,180,90,.14);
    --bad:#ec6a75;  --bad-soft:rgba(236,106,117,.14);
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --r:10px; --r-lg:16px;
    --fg:var(--ink); --panel:var(--surface); --panel2:var(--surface-2);   /* back-compat aliases */
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px -12px rgba(0,0,0,.5);
    --ring:0 0 0 3px var(--accent-soft);
    --ease:cubic-bezier(.22,.61,.36,1); --dur:.17s;
    color-scheme:dark;
  }
  /* Dark mode always (Qbit brand look) — no light-mode override. */
  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body {
    margin:0; background:var(--bg); color:var(--ink);
    font:400 15px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    font-feature-settings:"cv05","ss01"; letter-spacing:-0.006em;
  }
  ::selection { background:var(--accent-soft); }

  /* header */
  header { display:flex; align-items:center; gap:11px; padding:16px 22px; border-bottom:1px solid var(--line);
    background:linear-gradient(var(--surface),var(--bg)); position:sticky; top:0; z-index:20; backdrop-filter:saturate(1.2); }
  .mark { width:27px; height:27px; flex:none; display:grid; place-items:center; color:var(--accent); cursor:pointer; }
  .mark svg { width:27px; height:27px; display:block; }
  header h1 { font-size:15px; font-weight:650; margin:0; letter-spacing:-.01em; cursor:pointer; }
  header .tag { color:var(--mut); font-size:12.5px; margin-left:2px; }
  @media (max-width:560px){ header .tag { display:none; } }
  .navlink { margin-left:auto; color:var(--mut); font-size:13px; font-weight:550; cursor:pointer; text-decoration:none; }
  .navlink:hover { color:var(--ink); }
  .gh { margin-left:10px; display:inline-grid; place-items:center; width:32px; height:32px; border-radius:8px; color:var(--mut);
    border:1px solid transparent; transition:color var(--dur), background var(--dur), border-color var(--dur); }
  .gh:hover { color:var(--ink); background:var(--surface-2); border-color:var(--line); }
  .gh svg { width:19px; height:19px; }
  #lang { display:flex; gap:2px; background:var(--surface-2); border:1px solid var(--line); border-radius:999px; padding:2px; }
  #lang a { font-size:12px; font-weight:550; padding:3px 10px; border-radius:999px; color:var(--mut); text-decoration:none; transition:color var(--dur), background var(--dur); }
  #lang a[aria-current="true"] { color:var(--ink); background:var(--raised); box-shadow:0 1px 2px rgba(0,0,0,.2); }
  #lang a:hover { color:var(--ink); }

  main { max-width:560px; margin:0 auto; padding:30px 18px 72px; }

  /* card — one content container per wizard screen (not decorative repetition) */
  .card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg);
    padding:22px; margin:0 0 15px; box-shadow:var(--shadow); animation:enter .26s var(--ease) both; }
  .card h2 { color:var(--ink); font-size:19px; font-weight:660; letter-spacing:-.015em; margin:0 0 8px; text-wrap:balance; line-height:1.28; }
  .card h3 { margin:0; }
  @keyframes enter { from { opacity:0; transform:translateY(6px) scale(.995); } to { opacity:1; transform:none; } }

  .muted { color:var(--mut); }
  /* body-adjacent helper text — kept high enough contrast to read (≥4.5:1), not decorative gray */
  .note { font-size:13px; line-height:1.5; color:var(--ink-2); margin:9px 0 0; }
  .note.dim { color:var(--mut); }
  a { color:var(--accent); text-decoration:none; font-weight:500; }
  a:hover { text-decoration:underline; text-underline-offset:2px; }

  /* forms */
  label { display:block; font-size:12.5px; font-weight:550; color:var(--mut); margin:14px 0 5px; }
  input, select { width:100%; padding:11px 12px; background:var(--surface-2); color:var(--ink);
    border:1px solid var(--line-2); border-radius:var(--r); font:inherit; letter-spacing:-.005em;
    transition:border-color var(--dur), box-shadow var(--dur), background var(--dur); }
  input::placeholder { color:var(--mut); }
  input:hover, select:hover { border-color:var(--mut); }
  input:focus, select:focus { outline:none; border-color:var(--accent); box-shadow:var(--ring); background:var(--surface); }
  input[type=checkbox] { width:18px; height:18px; accent-color:var(--accent); margin:1px 0 0; }
  .row { display:flex; gap:12px; } .row > * { flex:1; min-width:0; }

  /* buttons — full state set + motion that conveys press/feedback */
  button { font:inherit; font-weight:550; letter-spacing:-.005em; color:var(--ink); cursor:pointer;
    padding:10px 15px; border-radius:var(--r); border:1px solid var(--line-2); background:var(--raised);
    transition:transform var(--dur) var(--ease), border-color var(--dur), background var(--dur), box-shadow var(--dur), opacity var(--dur); }
  button:hover { border-color:var(--mut); background:var(--surface-2); }
  button:active { transform:translateY(1px); }
  button:focus-visible { outline:none; box-shadow:var(--ring); border-color:var(--accent); }
  button.primary { background:var(--accent); border-color:transparent; color:var(--accent-ink); font-weight:620;
    box-shadow:0 1px 2px rgba(0,0,0,.2), 0 8px 20px -10px var(--accent); }
  button.primary:hover { filter:brightness(1.07); background:var(--accent); border-color:transparent; }
  button:disabled { opacity:.45; cursor:not-allowed; transform:none; filter:none; }
  .copy { font-size:12.5px; font-weight:550; padding:6px 11px; }
  .btns { display:flex; gap:10px; flex-wrap:wrap; margin-top:15px; }

  /* the big directional choices on the landing */
  .choice { width:100%; text-align:left; padding:21px 20px; margin-top:13px; display:flex; align-items:center; gap:16px; }
  .choice .glyph { width:42px; height:42px; border-radius:11px; flex:none; display:grid; place-items:center;
    background:var(--accent-soft); color:var(--accent); font-size:19px; font-weight:700; }
  .choice .ct { display:flex; flex-direction:column; gap:3px; }
  .choice .ct b { font-size:18px; font-weight:640; letter-spacing:-.01em; }
  .choice .ct span { font-size:13.5px; color:var(--mut); font-weight:400; }
  /* secondary card — the resume/recovery section reads as a quieter, utility block */
  .card.secondary { background:transparent; box-shadow:none; border-color:var(--line); padding:15px 17px; margin-top:6px; }
  .card.secondary h2 { font-size:13px; font-weight:600; color:var(--mut); letter-spacing:.01em; margin-bottom:5px; }
  .card.secondary .note { font-size:12.5px; }
  .choice .arr { margin-left:auto; color:var(--mut); transition:transform var(--dur) var(--ease), color var(--dur); }
  .choice:hover .arr { transform:translateX(3px); color:var(--accent); }

  /* code / key-value */
  code, .mono { font-family:var(--mono); font-size:12.5px; word-break:break-all; line-height:1.5; }
  .kv { display:grid; grid-template-columns:auto 1fr; gap:7px 14px; font-size:13px; align-items:baseline; }
  .kv .mono { background:var(--surface-2); padding:3px 7px; border-radius:6px; }
  .amt, .num { font-variant-numeric:tabular-nums; }

  /* status badge — soft tinted fill, not just an outline */
  .badge { display:inline-flex; align-items:center; gap:6px; padding:4px 11px; border-radius:999px;
    font-size:11.5px; font-weight:640; letter-spacing:.02em; text-transform:uppercase;
    background:var(--surface-2); color:var(--mut); border:1px solid var(--line); }
  .badge.good { color:var(--good); background:var(--good-soft); border-color:transparent; }
  .badge.warn { color:var(--warn); background:var(--warn-soft); border-color:transparent; }
  .badge.bad  { color:var(--bad);  background:var(--bad-soft);  border-color:transparent; }
  .badge.info { color:var(--accent); background:var(--accent-soft); border-color:transparent; }

  /* the deposit / amount panel — the pivotal moment of the flow */
  .fund { background:var(--surface-2); border:1px solid var(--line); border-radius:var(--r); padding:15px 16px; margin:14px 0 0; }
  .fund .amt { font-size:26px; font-weight:680; letter-spacing:-.02em; line-height:1.1; margin:5px 0; }
  .fund .mono { display:block; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:9px 11px; margin-top:8px; }

  /* status dot for presence / safety net */
  .dot { width:8px; height:8px; border-radius:50%; flex:none; display:inline-block; }
  .dot.live { background:var(--good); box-shadow:0 0 0 0 var(--good-soft); animation:pulse 2.4s var(--ease) infinite; }
  .dot.idle { background:var(--warn); }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(32,199,96,.5);} 70%{box-shadow:0 0 0 6px rgba(32,199,96,0);} 100%{box-shadow:0 0 0 0 rgba(32,199,96,0);} }
  .statusline { display:flex; align-items:center; gap:8px; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
    .card { animation:none; }
  }
</style>
</head>
